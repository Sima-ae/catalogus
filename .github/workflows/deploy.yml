# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APP_URL: https://superclones.cloud

jobs:
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          REPO_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          git init
          git remote add origin "$REPO_URL"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Setup Node.js 20
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production

  deploy:
    name: Deploy to production VPS
    needs: build-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check VPS secrets are configured
        id: vps_secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -n "${VPS_HOST:-}" && -n "${VPS_USER:-}" && -n "${VPS_SSH_KEY:-}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Skipping deploy: set VPS_HOST, VPS_USER, and VPS_SSH_KEY in repo Settings → Secrets."
          fi

      - name: Require VPS secrets (deploy cannot run without them)
        if: steps.vps_secrets.outputs.configured != 'true'
        run: |
          echo "::error::Deploy did not run. Add repository secrets VPS_HOST, VPS_USER, and VPS_SSH_KEY under Settings → Secrets and variables → Actions."
          echo "See deploy/GITHUB_DEPLOY.md for setup."
          exit 1

      - name: Deploy over SSH
        if: steps.vps_secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          GIT_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ -z "${VPS_HOST:-}" || -z "${VPS_USER:-}" || -z "${VPS_SSH_KEY:-}" ]]; then
            echo "::error::Missing GitHub secrets. Set VPS_HOST, VPS_USER, and VPS_SSH_KEY in repo Settings → Secrets."
            exit 1
          fi

          PORT="${VPS_SSH_PORT:-22}"
          if [[ -z "$PORT" ]]; then PORT=22; fi

          # Empty VPS_APP_PATH secret must not override the default
          if [[ -z "${VPS_APP_PATH:-}" ]]; then
            APP_DIR=/var/www/superclones.cloud
          else
            APP_DIR="$VPS_APP_PATH"
          fi
          REPO_URL="https://github.com/${{ github.repository }}.git"

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "==> SSH ${VPS_USER}@${VPS_HOST}:${PORT} (deploy path from VPS_APP_PATH secret)"

          REMOTE_SCRIPT="$(mktemp)"
          trap 'rm -f "$REMOTE_SCRIPT"' EXIT
          cat > "$REMOTE_SCRIPT" <<'REMOTE'
          set -euo pipefail
          : "${APP_DIR:?APP_DIR is not set}"
          : "${REPO_URL:?REPO_URL is not set}"

          ensure_git_repo() {
            if [[ -d "$APP_DIR/.git" ]]; then
              return 0
            fi

            PARENT="$(dirname "$APP_DIR")"
            mkdir -p "$PARENT" 2>/dev/null || true

            if [[ ! -d "$APP_DIR" ]]; then
              echo "==> First deploy: cloning into new directory"
              git clone "$REPO_URL" "$APP_DIR"
              return 0
            fi

            if [[ -z "$(ls -A "$APP_DIR" 2>/dev/null)" ]]; then
              echo "==> Empty directory: cloning repository"
              git clone "$REPO_URL" "$APP_DIR"
              return 0
            fi

            echo "::warning::Directory exists but is not a git repo — syncing from GitHub (preserving .env if present)"
            ENV_BACKUP=""
            if [[ -f "$APP_DIR/.env" ]]; then
              ENV_BACKUP="$(mktemp)"
              cp "$APP_DIR/.env" "$ENV_BACKUP"
            fi

            cd "$APP_DIR"
            git init -b main
            git remote add origin "$REPO_URL" 2>/dev/null || git remote set-url origin "$REPO_URL"
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            if [[ -n "$ENV_BACKUP" ]]; then
              cp "$ENV_BACKUP" .env
              rm -f "$ENV_BACKUP"
              echo "==> Restored existing .env"
            elif [[ ! -f .env ]] && [[ -f .env.vps.example ]]; then
              cp .env.vps.example .env
              echo "::warning::Created .env from .env.vps.example — edit secrets on the VPS before production use"
            fi
          }

          ensure_git_repo || {
            echo "::error::Could not set up git at deploy path."
            echo "SSH to the VPS and run: export APP_DIR='$APP_DIR' && bash scripts/vps-fix-git.sh"
            exit 1
          }

          cd "$APP_DIR"
          echo "==> Deploy directory: $(pwd)"
          echo "==> Fetch latest from GitHub"
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          echo "==> Git commit on server: $(git log -1 --oneline)"
          echo "==> Run deploy script"
          chmod +x scripts/deploy.sh
          bash scripts/deploy.sh
          test -f package.json && test -d src && echo "OK: app files present in $(pwd)"
          REMOTE

          ssh -i ~/.ssh/deploy_key -p "$PORT" -o BatchMode=yes -o ConnectTimeout=30 \
            "${VPS_USER}@${VPS_HOST}" \
            "APP_DIR=$(printf '%q' "$APP_DIR") REPO_URL=$(printf '%q' "$REPO_URL") bash -s" < "$REMOTE_SCRIPT"
