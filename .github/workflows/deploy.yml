# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Shell-only workflow (no actions/*) — build on GitHub, upload .next via ssh, deploy on VPS.
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APP_URL: https://superclones.cloud

jobs:
  build-and-deploy:
    name: Build and deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check VPS secrets are configured
        id: vps_secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -n "${VPS_HOST:-}" && -n "${VPS_USER:-}" && -n "${VPS_SSH_KEY:-}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Set VPS_HOST, VPS_USER=root, VPS_SSH_KEY (deploy key, no passphrase — same as inkoop.autos)."
          fi

      - name: Require VPS secrets (deploy cannot run without them)
        if: steps.vps_secrets.outputs.configured != 'true'
        run: |
          echo "::error::Add VPS_HOST, VPS_USER, VPS_SSH_KEY in Settings → Secrets → Actions."
          exit 1

      - name: Checkout
        env:
          REPO_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          git init
          git remote add origin "$REPO_URL"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Setup Node.js 20
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Package Next.js build
        run: |
          if [[ ! -f .next/BUILD_ID ]]; then
            echo "::error::next build did not produce .next/BUILD_ID"
            ls -la
            exit 1
          fi
          tar -czf next-build.tar.gz .next
          ls -lh next-build.tar.gz

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          VPS_PUBLIC_HTML: ${{ secrets.VPS_PUBLIC_HTML }}
        run: |
          set -euo pipefail

          PORT="${VPS_SSH_PORT:-22}"
          APP_DIR="${VPS_APP_PATH:-/var/www/superclones.cloud}"
          REPO_URL="https://github.com/${{ github.repository }}.git"

          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ! grep -qE 'BEGIN (OPENSSH |RSA )?PRIVATE KEY' ~/.ssh/deploy_key; then
            echo "::error::VPS_SSH_KEY must be a private key file (BEGIN … PRIVATE KEY)."
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY cannot be used by GitHub (passphrase-protected or invalid)."
            echo "Do not use ~/.ssh/id_ed25519 if it has a passphrase."
            echo "Use the same VPS_SSH_KEY as inkoop.autos, or on the VPS run:"
            echo "  bash $APP_DIR/scripts/setup-github-deploy-ssh.sh"
            echo "and paste the printed private key into GitHub secret VPS_SSH_KEY."
            exit 1
          fi

          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH_OPTS=(-i ~/.ssh/deploy_key -p "$PORT" -o BatchMode=yes -o ConnectTimeout=30 -o IdentitiesOnly=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -o TCPKeepAlive=yes)

          echo "==> SSH ${VPS_USER}@${VPS_HOST}:${PORT} → ${APP_DIR}"

          if ! timeout 15 bash -c "echo >/dev/tcp/${VPS_HOST}/${PORT}" 2>/dev/null; then
            echo "::error::Cannot reach ${VPS_HOST}:${PORT} (firewall or wrong VPS_HOST)."
            exit 1
          fi

          if ! ssh "${SSH_OPTS[@]}" "${VPS_USER}@${VPS_HOST}" 'echo "SSH OK as $(id -un)"'; then
            echo "::error::SSH auth failed. VPS_USER=root and VPS_SSH_KEY must match /root/.ssh/authorized_keys."
            echo "Copy VPS_SSH_KEY from inkoop.autos repo secrets, or run setup-github-deploy-ssh.sh on the VPS."
            exit 1
          fi

          echo "==> Upload pre-built .next to VPS"
          ls -lh next-build.tar.gz
          ssh "${SSH_OPTS[@]}" "${VPS_USER}@${VPS_HOST}" "cat > /tmp/next-build.tar.gz" < next-build.tar.gz
          ssh "${SSH_OPTS[@]}" "${VPS_USER}@${VPS_HOST}" 'test -s /tmp/next-build.tar.gz'

          REMOTE_SCRIPT="$(mktemp)"
          trap 'rm -f "$REMOTE_SCRIPT"' EXIT
          cat > "$REMOTE_SCRIPT" <<'REMOTE'
          set -euo pipefail
          : "${APP_DIR:?}"
          : "${REPO_URL:?}"

          git config --global --add safe.directory "$APP_DIR" 2>/dev/null || true

          if [[ ! -d "$APP_DIR/.git" ]]; then
            PARENT="$(dirname "$APP_DIR")"
            mkdir -p "$PARENT"
            if [[ ! -d "$APP_DIR" ]] || [[ -z "$(ls -A "$APP_DIR" 2>/dev/null)" ]]; then
              git clone "$REPO_URL" "$APP_DIR"
            else
              ENV_BACKUP=""
              [[ -f "$APP_DIR/.env" ]] && ENV_BACKUP="$(mktemp)" && cp "$APP_DIR/.env" "$ENV_BACKUP"
              cd "$APP_DIR"
              git init -b main
              git remote add origin "$REPO_URL" 2>/dev/null || git remote set-url origin "$REPO_URL"
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
              [[ -n "$ENV_BACKUP" ]] && cp "$ENV_BACKUP" .env && rm -f "$ENV_BACKUP"
            fi
          fi

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          echo "==> $(git log -1 --oneline)"

          echo "==> Install pre-built .next from CI"
          rm -rf .next
          tar -xzf /tmp/next-build.tar.gz -C .
          rm -f /tmp/next-build.tar.gz
          if [[ ! -f .next/BUILD_ID ]]; then
            echo "ERROR: extracted .next is missing BUILD_ID"
            exit 1
          fi

          chmod +x scripts/deploy.sh 2>/dev/null || true
          SKIP_BUILD=1 bash scripts/deploy.sh
          curl -sf -o /dev/null -w "catalogus :3001 HTTP %{http_code}\n" http://127.0.0.1:3001/ || echo "WARN: :3001 not reachable"
          REMOTE

          PUBLIC_HTML="${VPS_PUBLIC_HTML:-/home/superclones.cloud/public_html}"
          if ! ssh "${SSH_OPTS[@]}" "${VPS_USER}@${VPS_HOST}" \
            "APP_DIR=$(printf '%q' "$APP_DIR") REPO_URL=$(printf '%q' "$REPO_URL") CATALOGUS_PUBLIC_HTML=$(printf '%q' "$PUBLIC_HTML") bash -s" < "$REMOTE_SCRIPT"; then
            echo "::error::Deploy SSH session failed. Re-run workflow or on VPS: bash scripts/deploy.sh"
            exit 1
          fi
          echo "==> Deploy SSH session finished OK"
