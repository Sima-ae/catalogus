# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APP_URL: https://superclones.cloud

jobs:
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        env:
          REPO_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          git init
          git remote add origin "$REPO_URL"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Setup Node.js 20
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production

  deploy:
    name: Deploy to production VPS
    needs: build-check
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check VPS secrets are configured
        id: vps_secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [[ -n "${VPS_HOST:-}" && -n "${VPS_USER:-}" && -n "${VPS_SSH_KEY:-}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Set VPS_HOST, VPS_USER=root, VPS_SSH_KEY (deploy key, no passphrase — same as inkoop.autos)."
          fi

      - name: Require VPS secrets (deploy cannot run without them)
        if: steps.vps_secrets.outputs.configured != 'true'
        run: |
          echo "::error::Add VPS_HOST, VPS_USER, VPS_SSH_KEY in Settings → Secrets → Actions."
          exit 1

      - name: Deploy over SSH
        if: steps.vps_secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          VPS_PUBLIC_HTML: ${{ secrets.VPS_PUBLIC_HTML }}
        run: |
          set -euo pipefail

          trim() { printf '%s' "$1" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }

          VPS_HOST="$(trim "${VPS_HOST:-}")"
          VPS_USER="$(trim "${VPS_USER:-}")"
          PORT="$(trim "${VPS_SSH_PORT:-22}")"
          PORT="${PORT:-22}"
          APP_DIR="$(trim "${VPS_APP_PATH:-/var/www/superclones.cloud}")"
          APP_DIR="${APP_DIR:-/var/www/superclones.cloud}"
          REPO_URL="https://github.com/${{ github.repository }}.git"

          if [[ -z "$VPS_HOST" || -z "$VPS_USER" ]]; then
            echo "::error::VPS_HOST and VPS_USER must be non-empty after trimming whitespace."
            exit 1
          fi

          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ! grep -qE 'BEGIN (OPENSSH |RSA )?PRIVATE KEY' ~/.ssh/deploy_key; then
            echo "::error::VPS_SSH_KEY must be a private key file (BEGIN … PRIVATE KEY)."
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY cannot be used by GitHub (passphrase-protected or invalid)."
            echo "Do not use ~/.ssh/id_ed25519 if it has a passphrase."
            echo "Use the same VPS_SSH_KEY as inkoop.autos, or on the VPS run:"
            echo "  bash $APP_DIR/scripts/setup-github-deploy-ssh.sh"
            echo "and paste the printed private key into GitHub secret VPS_SSH_KEY."
            exit 1
          fi

          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          SSH_OPTS=(-i ~/.ssh/deploy_key -p "$PORT" -o BatchMode=yes -o ConnectTimeout=30 -o IdentitiesOnly=yes)

          echo "==> SSH ${VPS_USER}@${VPS_HOST}:${PORT} → ${APP_DIR}"

          RUNNER_IP="$(curl -fsS --max-time 8 https://api.ipify.org 2>/dev/null || curl -fsS --max-time 8 https://ifconfig.me 2>/dev/null || true)"
          if [[ -n "$RUNNER_IP" ]]; then
            echo "==> This job egress IP: ${RUNNER_IP} (if blocked on VPS: csf -dr ${RUNNER_IP} or fail2ban-client set sshd unbanip ${RUNNER_IP})"
          fi

          if ! getent hosts "$VPS_HOST" >/dev/null 2>&1; then
            echo "::error::DNS lookup failed for VPS_HOST=${VPS_HOST}."
            echo "Use the public hostname (superclones.cloud) or server IP — not the internal hostname from \`hostname\`."
            exit 1
          fi
          DNS_LINE="$(getent hosts "$VPS_HOST" | head -3)"
          echo "==> DNS: ${DNS_LINE}"
          if echo "$DNS_LINE" | grep -qi 'do-it\.vip'; then
            echo "::warning::VPS_HOST resolves to do-it.vip. Prefer GitHub secret VPS_HOST=superclones.cloud if that is the site A record."
          fi

          tcp_ok=false
          for attempt in 1 2 3 4; do
            echo "==> TCP check attempt ${attempt}/4 → ${VPS_HOST}:${PORT}"
            if nc -zvw15 "$VPS_HOST" "$PORT" 2>&1; then
              tcp_ok=true
              break
            fi
            if [[ "$attempt" -lt 4 ]]; then
              echo "Retry in 20s (CSF/fail2ban often blocks GitHub datacenter IPs intermittently)…"
              sleep 20
            fi
          done
          if [[ "$tcp_ok" != "true" ]]; then
            echo "::error::Cannot reach ${VPS_HOST}:${PORT} from GitHub Actions after 4 attempts."
            echo "Your Mac may still connect — CSF/fail2ban blocks datacenter IPs. On the VPS as root:"
            echo "  bash /var/www/superclones.cloud/scripts/vps-allow-github-actions-ssh.sh"
            echo "  bash /var/www/superclones.cloud/scripts/vps-check-github-ssh.sh"
            if [[ -n "$RUNNER_IP" ]]; then
              echo "  csf -dr ${RUNNER_IP} 2>/dev/null; fail2ban-client set sshd unbanip ${RUNNER_IP} 2>/dev/null"
            fi
            echo "GitHub secrets: VPS_HOST=superclones.cloud  VPS_USER=root  VPS_SSH_KEY=<deploy key, no passphrase>"
            echo "Optional: VPS_SSH_PORT if SSH is not on 22."
            exit 1
          fi

          ssh_ok=false
          for attempt in 1 2 3; do
            echo "==> SSH auth attempt ${attempt}/3"
            if ssh "${SSH_OPTS[@]}" "${VPS_USER}@${VPS_HOST}" 'echo "SSH OK as $(id -un)"'; then
              ssh_ok=true
              break
            fi
            [[ "$attempt" -lt 3 ]] && sleep 15
          done
          if [[ "$ssh_ok" != "true" ]]; then
            echo "::error::SSH auth failed. VPS_USER=root and VPS_SSH_KEY must match /root/.ssh/authorized_keys."
            echo "On VPS: bash /var/www/superclones.cloud/scripts/setup-github-deploy-ssh.sh"
            echo "Then paste the printed private key into GitHub secret VPS_SSH_KEY (no passphrase)."
            exit 1
          fi

          REMOTE_SCRIPT="$(mktemp)"
          trap 'rm -f "$REMOTE_SCRIPT"' EXIT
          cat > "$REMOTE_SCRIPT" <<'REMOTE'
          set -euo pipefail
          : "${APP_DIR:?}"
          : "${REPO_URL:?}"

          git config --global --add safe.directory "$APP_DIR" 2>/dev/null || true

          if [[ ! -d "$APP_DIR/.git" ]]; then
            PARENT="$(dirname "$APP_DIR")"
            mkdir -p "$PARENT"
            if [[ ! -d "$APP_DIR" ]] || [[ -z "$(ls -A "$APP_DIR" 2>/dev/null)" ]]; then
              git clone "$REPO_URL" "$APP_DIR"
            else
              ENV_BACKUP=""
              [[ -f "$APP_DIR/.env" ]] && ENV_BACKUP="$(mktemp)" && cp "$APP_DIR/.env" "$ENV_BACKUP"
              cd "$APP_DIR"
              git init -b main
              git remote add origin "$REPO_URL" 2>/dev/null || git remote set-url origin "$REPO_URL"
              git fetch origin main
              git reset --hard origin/main
              git clean -fd
              [[ -n "$ENV_BACKUP" ]] && cp "$ENV_BACKUP" .env && rm -f "$ENV_BACKUP"
            fi
          fi

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main
          git clean -fd
          echo "==> $(git log -1 --oneline)"
          chmod +x scripts/deploy.sh 2>/dev/null || true
          bash scripts/deploy.sh
          curl -sf -o /dev/null -w "catalogus :3001 HTTP %{http_code}\n" http://127.0.0.1:3001/ || echo "WARN: :3001 not reachable"
          REMOTE

          PUBLIC_HTML="${VPS_PUBLIC_HTML:-/home/superclones.cloud/public_html}"
          ssh "${SSH_OPTS[@]}" "${VPS_USER}@${VPS_HOST}" \
            "APP_DIR=$(printf '%q' "$APP_DIR") REPO_URL=$(printf '%q' "$REPO_URL") CATALOGUS_PUBLIC_HTML=$(printf '%q' "$PUBLIC_HTML") bash -s" < "$REMOTE_SCRIPT"
