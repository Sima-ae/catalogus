# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: production
  NEXT_PUBLIC_APP_URL: https://superclones.cloud

permissions:
  contents: read

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Shell checkout (no actions/* — avoids IDE "Unable to resolve action" false positives)
      - name: Checkout
        env:
          REPO_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          git init
          git remote add origin "$REPO_URL"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Setup Node.js
        run: |
          node -v
          npm -v
          node -e "const m = process.versions.node.match(/^(\\d+)/); if (!m || +m[1] < 20) { console.error('Node 20+ required'); process.exit(1); }"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
